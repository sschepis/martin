<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ring Construct Simulation (Fixed Rings with Collisions)</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="simulationCanvas" width="800" height="600"></canvas>
    <script>
        class Construct {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 10;
                this.ring1Angle = Math.random() * Math.PI * 2;
                this.ring2Angle = Math.random() * Math.PI * 2;
                this.vx = 0;
                this.vy = 0;
                this.mass = 10000;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Boundary check
                if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                    this.vx *= -1;
                    this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                }
                if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
                    this.vy *= -1;
                    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                }

                // Apply friction
//                this.vx *= 0.99;
  //              this.vy *= 0.99;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'blue';
                ctx.fill();

                // Draw ring1
                ctx.beginPath();
                ctx.arc(this.x, this.y, 20, this.ring1Angle, this.ring1Angle + Math.PI);
                ctx.strokeStyle = 'red';
                ctx.stroke();

                // Draw ring2
                ctx.beginPath();
                ctx.arc(this.x, this.y, 25, this.ring2Angle, this.ring2Angle + Math.PI);
                ctx.strokeStyle = 'green';
                ctx.stroke();
            }
        }

        function calculateForce(c1, c2) {
            const dx = c2.x - c1.x;
            const dy = c2.y - c1.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 1) return { fx: 0, fy: 0 };

            const angleDiff1 = Math.abs(c1.ring1Angle - c2.ring1Angle);
            const angleDiff2 = Math.abs(c1.ring2Angle - c2.ring2Angle);

            const forceMagnitude = (Math.cos(angleDiff1) + Math.cos(angleDiff2)) / (distance * distance);

            return {
                fx: (forceMagnitude * dx) / distance,
                fy: (forceMagnitude * dy) / distance
            };
        }

        function resolveCollision(c1, c2) {
            const dx = c2.x - c1.x;
            const dy = c2.y - c1.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const minDistance = c1.radius + c2.radius;

            if (distance < minDistance) {
                // Move constructs apart
                const overlap = (minDistance - distance) / 2;
                const moveX = (dx / distance) * overlap;
                const moveY = (dy / distance) * overlap;

                c1.x -= moveX;
                c1.y -= moveY;
                c2.x += moveX;
                c2.y += moveY;

                // Calculate new velocities
                const nx = dx / distance;
                const ny = dy / distance;
                const kx = c1.vx - c2.vx;
                const ky = c1.vy - c2.vy;
                const p = 2 * (nx * kx + ny * ky) / (c1.mass + c2.mass);

                c1.vx = c1.vx - p * c2.mass * nx;
                c1.vy = c1.vy - p * c2.mass * ny;
                c2.vx = c2.vx + p * c1.mass * nx;
                c2.vy = c2.vy + p * c1.mass * ny;
            }
        }

        const canvas = document.getElementById('simulationCanvas');
        const ctx = canvas.getContext('2d');

        const constructs = [];
        for (let i = 0; i < 100; i++) {
            constructs.push(new Construct(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        function simulate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < constructs.length; i++) {
                for (let j = i + 1; j < constructs.length; j++) {
                    const force = calculateForce(constructs[i], constructs[j]);
                    constructs[i].vx += force.fx;
                    constructs[i].vy += force.fy;
                    constructs[j].vx -= force.fx;
                    constructs[j].vy -= force.fy;

                    resolveCollision(constructs[i], constructs[j]);
                }
                constructs[i].update();
                constructs[i].draw(ctx);
            }

            requestAnimationFrame(simulate);
        }

        simulate();
    </script>
</body>
</html>
